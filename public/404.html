<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>EAURA</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into a query parameter so index.html can decode it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
        encodeURIComponent(l.pathname + l.search) +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
